# ========== Database Configuration ==========
quarkus.datasource.db-kind=mysql
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD}
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL}

# Hibernate Configuration
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.database.generation=validate

# ========== JWT Configuration ==========
jwt.secret=${JWT_SECRET:ClinicaVitalisSecureJwtSecretKeyFor512BitHS512AlgorithmMinimumRequirement2024JwtSecret}
jwt.expiration.ms=${JWT_EXPIRATION_MS:3600000}
jwt.refresh.expiration.ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# ========== Server Configuration ==========
quarkus.http.port=8080
quarkus.application.name=clinicavitalis-auth